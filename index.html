<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEARTOPIA - Global Product Scanner</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@200;300;400;500;600&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        :root {
            --primary: #6ADBFB;
            --primary-dark: #3ab8d8;
            --secondary: #1a8fb5;
            --accent: #e53935;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f1f5f9;
            --text-dim: #94a3b8;
            --border: rgba(106, 219, 251, 0.2);
            --gradient: linear-gradient(135deg, #6ADBFB 0%, #1a8fb5 100%);
        }

        * {
            box-sizing: border-box;
            outline: none;
        }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(106, 219, 251, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(26, 143, 181, 0.05) 0%, transparent 40%);
            color: var(--text);
            font-family: 'Prompt', 'Outfit', sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 40px 20px;
            background: var(--card-bg);
            border-radius: 24px;
            border: 1px solid var(--border);
            backdrop-filter: blur(12px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2.5rem;
            margin: 0;
            background: var(--gradient);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        p.subtitle {
            color: var(--text-dim);
            font-size: 1rem;
            margin-top: 10px;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            margin-top: 30px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-width: 150px;
        }

        label {
            font-size: 0.8rem;
            color: var(--text-dim);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border);
            padding: 12px 16px;
            border-radius: 12px;
            color: #fff;
            font-family: 'Prompt', sans-serif;
            transition: all 0.3s;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(106, 219, 251, 0.1);
        }

        .btn {
            padding: 12px 28px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
            font-family: 'Prompt', sans-serif;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1rem;
        }

        .btn-primary {
            background: var(--gradient);
            color: #fff;
            box-shadow: 0 4px 15px rgba(106, 219, 251, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
            box-shadow: 0 6px 20px rgba(106, 219, 251, 0.4);
        }

        .btn-secondary {
            background: rgba(148, 163, 184, 0.1);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: rgba(148, 163, 184, 0.2);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        /* Stats Bar */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid var(--border);
            text-align: center;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            font-family: 'Outfit', sans-serif;
            color: var(--primary);
        }

        .stat-label {
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-top: 4px;
        }

        /* Results Area */
        .results-container {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .region-section {
            background: var(--card-bg);
            border-radius: 20px;
            border: 1px solid var(--border);
            overflow: hidden;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .region-header {
            padding: 15px 25px;
            background: rgba(106, 219, 251, 0.05);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .region-title {
            font-size: 1.2rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .region-badge {
            background: var(--primary);
            color: #000;
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 800;
        }

        .product-grid {
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 15px;
        }

        .product-card {
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 14px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            transition: 0.3s;
        }

        .product-card:hover {
            border-color: var(--primary);
            background: rgba(106, 219, 251, 0.05);
            transform: scale(1.02);
        }

        .product-card img {
            width: 80px;
            height: 80px;
            object-fit: contain;
            margin-bottom: 12px;
        }

        .p-name {
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 10px;
            height: 2.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .p-price-tag {
            background: rgba(106, 219, 251, 0.1);
            padding: 6px 12px;
            border-radius: 8px;
            color: var(--primary);
            font-weight: 700;
            font-size: 1rem;
        }

        .p-sku {
            font-size: 0.65rem;
            color: var(--text-dim);
            margin-top: 8px;
            font-family: monospace;
        }

        /* Progress Bottom Bar */
        #loadingOverlay {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(20px);
            z-index: 9999;
            display: none;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
            padding: 10px 40px;
            border-top: 1px solid var(--border);
            box-shadow: 0 -10px 30px rgba(0,0,0,0.3);
            gap: 20px;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(106, 219, 251, 0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s infinite linear;
            flex-shrink: 0;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 0.9rem;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 300px;
        }

        .progress-bar-container {
            flex: 1;
            height: 6px;
            background: rgba(255,255,255,0.05);
            border-radius: 3px;
            overflow: hidden;
        }

        #progressBar {
            width: 0%;
            height: 100%;
            background: var(--gradient);
            transition: width 0.3s;
        }

        #progressSubText {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--primary);
            min-width: 100px;
            text-align: right;
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary);
        }

        @media (max-width: 768px) {
            h1 { font-size: 1.8rem; }
            .controls { flex-direction: column; align-items: stretch; }
            .stat-card { padding: 15px; }
            #loadingOverlay {
                padding: 12px 20px;
                flex-wrap: wrap;
                gap: 10px;
            }
            .loading-text { font-size: 0.75rem; max-width: 150px; }
            .progress-bar-container { order: 3; width: 100%; flex: none; }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>GLOBAL PRODUCT SCANNER</h1>
            <p class="subtitle">ดึงรายการสินค้าจากทุกประเทศผ่านระบบ API ของ XD WebPay</p>

            <div class="controls">
                <div class="input-group">
                    <label>UID (Optional)</label>
                    <input type="text" id="v_uid" placeholder="UserID" value="852904750520471552">
                </div>
                <div class="input-group">
                    <label>SID (Optional)</label>
                    <input type="text" id="v_sid" placeholder="ServerID" value="sgp-prod">
                </div>
                <div class="input-group">
                    <label>AID (Optional)</label>
                    <input type="text" id="v_aid" placeholder="RoleID" value="1egw5bkq">
                </div>
                <div class="input-group" style="justify-content: flex-end;">
                    <button id="btnScan" class="btn btn-primary" onclick="startScan()">
                        <span style="font-size: 1.2rem;">🔍</span> เริ่มสแกนทุกประเทศ
                    </button>
                </div>
                <div class="input-group" style="justify-content: flex-end;">
                    <button id="btnExport" class="btn btn-secondary" onclick="exportData()" disabled>
                        <span>📥</span> Export JSON
                    </button>
                </div>
            </div>
        </header>

        <div class="stats-bar">
            <div class="stat-card">
                <div class="stat-value" id="count_regions">0</div>
                <div class="stat-label">ภูมิภาคที่พบ</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="count_products">0</div>
                <div class="stat-label">สินค้าทั้งหมด</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="scan_status">READY</div>
                <div class="stat-label">สถานะระบบ</div>
            </div>
        </div>

        <div id="results" class="results-container" style="padding-bottom: 80px;">
            <!-- Results will be injected here -->
            <div style="text-align: center; color: var(--text-dim); padding: 60px;">
                กดปุ่ม "เริ่มสแกนทุกประเทศ" เพื่อดึงข้อมูลสินค้า
            </div>
        </div>
    </div>

    <div id="loadingOverlay">
        <div class="spinner"></div>
        <div class="loading-text" id="loadingText">กำลังเตรียมการ...</div>
        <div class="progress-bar-container">
            <div id="progressBar"></div>
        </div>
        <div id="progressSubText">0%</div>
    </div>

    <script>
        // Configuration from original index.html
        const CFG = {
            KEY: "hNcW8HB3Z",
            KID: "kkoVvr75TI72iygiUAAa0lojMDkA8bCF19LDLjVwyh8TgAmgpbJ1SBK3EycWsuVZ_TqSFuiQjyZHLSj-41qH-mc8ef-A0tGlbSUrlNhX0DZGQJvgsg3ufy2QalINCgFhAegWicyPPW8nN20CFjtzQKdXpc0ku5ak03i2r3oagpM",
            HOST: "xdsdk-intnl-6.xd.com",
            APP: "2085001"
        };

        const SESSION_DATA = {
            regions: [],
            results: {},
            totalProducts: 0
        };

        const ADDITIONAL_REGIONS = [
            { region: 'IR', regionName: 'อิหร่าน (Iran)', currency: 'USD' },
            { region: 'VN', regionName: 'เวียดนาม (Vietnam)', currency: 'VND' },
            { region: 'LA', regionName: 'ลาว (Laos)', currency: 'LAK' },
            { region: 'MM', regionName: 'พม่า (Myanmar)', currency: 'MMK' },
            { region: 'LB', regionName: 'เลบานอน (Lebanon)', currency: 'USD' },
            { region: 'PY', regionName: 'ปารากวัย (Paraguay)', currency: 'USD' },
            { region: 'SL', regionName: 'เซียร์ราลีโอน (Sierra Leone)', currency: 'USD' },
            { region: 'LY', regionName: 'ลิเบีย (Libya)', currency: 'USD' },
            { region: 'ZM', regionName: 'แซมเบีย (Zambia)', currency: 'USD' }
        ];

        const SERVER_IDS = ['sgp-prod', 'fra-prod', 'va-prod', 'jp-prod', 'hk-prod'];

        // Signature logic exactly as in main app
        function sign(path, method = "GET", body = null) {
            const ts = Math.floor(Date.now() / 1000);
            const nonce = Math.random().toString(36).substring(7);
            
            let bodyHash = "";
            if (method === "POST" && body) {
                const bStr = typeof body === 'object' ? JSON.stringify(body) : body;
                bodyHash = CryptoJS.enc.Base64.stringify(CryptoJS.SHA256(bStr));
            }

            const m = `${ts}\n${nonce}\n${method}\n${path}\n${CFG.HOST}\n\n${bodyHash}\n`;
            const h = CryptoJS.HmacSHA1(m, CFG.KEY);
            const b = CryptoJS.enc.Base64.stringify(h);
            return `MAC id="${CFG.KID}",ts="${ts}",nonce="${nonce}",mac="${b}"`;
        }

        async function apiFetch(path) {
            try {
                const res = await fetch(`https://${CFG.HOST}${path}`, { 
                    headers: { "Authorization": sign(path) } 
                });
                return await res.json();
            } catch (e) {
                console.error("Fetch Error:", e);
                return { code: 500, data: null };
            }
        }

        async function fetchRegions() {
            try {
                const regPath = `/product/v1/query/game/regions?appId=${CFG.APP}&source=webpay&lang=th_TH`;
                const regData = await apiFetch(regPath);
                if (regData.data && regData.data.list) return regData.data.list;
            } catch (e) {}
            return [
                { region: 'TH', regionName: 'Thailand' },
                { region: 'MY', regionName: 'Malaysia' },
                { region: 'TW', regionName: 'Taiwan' },
                { region: 'JP', regionName: 'Japan' },
                { region: 'PH', regionName: 'Philippines' },
                { region: 'ID', regionName: 'Indonesia' },
                { region: 'TR', regionName: 'Turkey' },
                { region: 'NG', regionName: 'Nigeria' },
                { region: 'DF', regionName: 'Mexico (Global)' }
            ];
        }

        async function startScan() {
            const btn = document.getElementById('btnScan');
            const resultsDiv = document.getElementById('results');
            
            btn.disabled = true;
            document.getElementById('loadingOverlay').style.display = 'flex';
            resultsDiv.innerHTML = '';
            SESSION_DATA.results = {};
            SESSION_DATA.totalProducts = 0;
            updateStats();

            try {
                // 1. Get official regions
                setLoadingProgress('ดึงฐานข้อมูลภูมิภาค...', 5);
                let regions = await fetchRegions();

                // 2. Add requested countries that aren't in the list
                ADDITIONAL_REGIONS.forEach(ar => {
                    if (!regions.find(r => (r.region || r.code) === ar.region)) {
                        regions.push(ar);
                    }
                });

                document.getElementById('count_regions').innerText = regions.length;

                const u = document.getElementById('v_uid').value || "852904750520471552"; // ID ลับจาก .har
                const s = document.getElementById('v_sid').value || "sgp-prod";
                const a = document.getElementById('v_aid').value || "1egw5bkq"; // Role ลับจาก .har

                for (let i = 0; i < regions.length; i++) {
                    const r = regions[i];
                    const pct = Math.floor(5 + ((i / regions.length) * 90));
                    const rCode = r.region || r.code;
                    const rName = r.regionName || r.name;
                    
                    setLoadingProgress(`กำลังสแกน: ${rName} (${rCode})...`, pct);
                    
                    // แผนการดึง: ลอง รหัสประเทศตรงๆ -> ถ้าไม่เจอ ลอง "DF" (Global) สำหรับประเทศนั้น
                    let regionProducts = await scanProductsForRegion(rCode, s, a, u);
                    
                    if (regionProducts.length === 0 && rCode !== 'DF') {
                        // Fallback logic: สำหรับประเทศที่ API ไม่รู้จักโค้ด ISO โดยตรง 
                        // ให้ใช้รหัส "DF" (Global Default) แต่ระบุค่าเป็นประเทศนั้นๆ เพื่อดึงช่องทางการชำระเงินสากล
                        console.log(`Fallback scan for ${rCode} using DF...`);
                        regionProducts = await scanProductsForRegion('DF', s, a, u);
                    }
                    
                    if (regionProducts.length > 0) {
                        SESSION_DATA.results[rCode] = { info: r, products: regionProducts };
                        appendRegionResult(r, regionProducts);
                    }
                    updateStats();
                }

                setLoadingProgress('แสกนสำเร็จ!', 100);
                document.getElementById('scan_status').innerText = 'COMPLETE';
                document.getElementById('btnExport').disabled = false;
                setTimeout(() => { document.getElementById('loadingOverlay').style.display = 'none'; }, 2000);

            } catch (err) {
                console.error(err);
                document.getElementById('scan_status').innerText = 'ERROR';
            }
            btn.disabled = false;
        }

        async function scanProductsForRegion(rCode, s, a, u) {
            const pPath = `/payment/product/v2/query/game/products?appId=${CFG.APP}&region=${rCode}&source=webpay&pt=Android&lang=th_TH&serverId=${s}&roleId=${a}&userId=${u}`;
            try {
                const pData = await apiFetch(pPath);
                if (pData.data && Array.isArray(pData.data)) {
                    const results = [];
                    for (const group of pData.data) {
                        if (group.products) {
                            for (const p of group.products) {
                                // ดึงช่องทางชำระเงินตามประเทศจริง
                                p.channels = await fetchChannels(p, rCode, s, a, u);
                                results.push(p);
                                SESSION_DATA.totalProducts++;
                            }
                        }
                    }
                    return results;
                }
            } catch (e) {}
            return [];
        }

        async function fetchChannels(p, rgn, s, a, u) {
            // ลอง v2 ก่อน แล้วค่อย v1 (เพื่อดึงให้ได้ทุกประเทศ)
            try {
                const q = `appId=${CFG.APP}&lang=th_TH&productSkuCode=${p.productSkuCode}&pt=Android&region=${rgn}&roleId=${a}&serverId=${s}&source=webpay&userId=${u}`;
                const path = `/payment/product/v2/query/game/product/channels?${q}`;
                const data = await apiFetch(path);
                
                if (data.code === 200 && data.data && data.data.length > 0) {
                    return extractChannelsFromData(data.data, p);
                }

                // Fallback v1 (บางประเทศอาจใช้ API เก่า)
                const q1 = `appId=${CFG.APP}&lang=th_TH&productSkuCode=${p.productSkuCode}&pt=Android&region=${rgn}&roleId=${a}&serverId=${s}&source=webpay`;
                const path1 = `/product/v1/query/game/product/channels?${q1}`;
                const data1 = await apiFetch(path1);
                if (data1.code === 200 && data1.data) {
                    return extractChannelsFromData(data1.data, p);
                }
            } catch (e) {}
            return [];
        }

        function extractChannelsFromData(rawGroups, p) {
            const channels = [];
            rawGroups.forEach(group => {
                (group.channels || []).forEach(ch => {
                    channels.push({
                        name: ch.subChannelName || ch.channelName,
                        code: ch.subChannelCode || ch.channelCode,
                        price: ch.salePrice || p.salePrice,
                        currency: ch.currency || p.currency || 'USD'
                    });
                });
            });
            return channels;
        }

        function setLoadingProgress(text, pct) {
            document.getElementById('loadingText').innerText = text;
            document.getElementById('progressBar').style.width = pct + '%';
            document.getElementById('progressSubText').innerText = `${pct}% ประมวลผลสำเร็จ`;
        }

        function updateStats() {
            document.getElementById('count_products').innerText = SESSION_DATA.totalProducts;
        }

        function appendRegionResult(region, products) {
            const resultsDiv = document.getElementById('results');
            const rCode = region.region || region.code;
            const rName = region.regionName || region.name;

            const section = document.createElement('div');
            section.className = 'region-section';
            
            section.innerHTML = `
                <div class="region-header">
                    <div class="region-title">
                        <span>🌏</span> ${rName}
                        <span class="region-badge">${rCode}</span>
                    </div>
                    <div style="font-size: 0.8rem; color: var(--text-dim);">
                        ${products.length} Items Found
                    </div>
                </div>
                <div class="product-grid">
                    ${products.map(p => {
                        const img = p.icon || p.iconUrl || p.imageUrl || 'https://webpay.xd.com/static/img/default-product.png';
                        const mainPrice = p.displaySalePrice || (p.salePrice + ' ' + (p.currency || ''));
                        
                        // แสดงช่องทางการชำระเงินทั้งหมด
                        let channelHtml = '';
                        if (p.channels && p.channels.length > 0) {
                            channelHtml = `
                                <div style="margin-top: 12px; width: 100%; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 10px; display: flex; flex-direction: column; gap: 6px;">
                                    <div style="font-size: 0.65rem; color: var(--primary); font-weight: 600; text-align: left; margin-bottom: 2px;">PAYMENT CHANNELS:</div>
                                    ${p.channels.map(ch => `
                                        <div style="display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.2); padding: 4px 8px; border-radius: 6px; font-size: 0.7rem;">
                                            <span style="color: var(--text); font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 100px;">${ch.name}</span>
                                            <span style="color: #ff5252; font-weight: 700; flex-shrink: 0;">${ch.price} ${ch.currency}</span>
                                        </div>
                                    `).join('')}
                                </div>
                            `;
                        } else {
                            channelHtml = `
                                <div style="margin-top: 10px; font-size: 0.65rem; color: var(--text-dim);">
                                    ไม่พบข้อมูลช่องทาง (ลองใส่ UID)
                                </div>
                            `;
                        }

                        return `
                            <div class="product-card">
                                <img src="${img}" onerror="this.src='https://webpay.xd.com/static/img/default-product.png'">
                                <div class="p-name">${p.productSkuName}</div>
                                <div class="p-price-tag">${mainPrice}</div>
                                ${channelHtml}
                                <div class="p-sku">${p.productSkuCode}</div>
                            </div>
                        `;
                    }).join('')}
                </div>
            `;
            resultsDiv.appendChild(section);
        }

        function exportData() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(SESSION_DATA.results, null, 2));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", "heartopia_products_all_regions.json");
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
        }
        
        updateStats();
    </script>
</body>

</html>
